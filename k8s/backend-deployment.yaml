apiVersion: apps/v1
kind: Deployment
metadata:
  name: limbus-backend
  labels:
    app: limbus-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: limbus-backend
  template:
    metadata:
      labels:
        app: limbus-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/${GITHUB_OWNER}/limbus-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: MONGODB_URI
              value: mongodb://limbus-mongodb:27017/limbus_teams
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
