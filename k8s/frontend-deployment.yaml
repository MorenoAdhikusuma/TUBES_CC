apiVersion: apps/v1
kind: Deployment
metadata:
  name: limbus-frontend
  labels:
    app: limbus-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: limbus-frontend
  template:
    metadata:
      labels:
        app: limbus-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/${GITHUB_OWNER}/limbus-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
