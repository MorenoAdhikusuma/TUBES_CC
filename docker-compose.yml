version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: limbus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - limbus-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: limbus-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/limbus_teams
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - limbus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: limbus-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - limbus-network

volumes:
  mongo-data:
    driver: local

networks:
  limbus-network:
    driver: bridge
